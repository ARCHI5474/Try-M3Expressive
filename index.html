<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Material 3 Expressive - Perfect Showroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================================
       1. 設計トークン定義 (カラー＆アニメーション変数)
       ========================================================================== */
    :root {
      --bg: #060d11; 
      --surface: rgba(17, 34, 43, 0.75); 
      --surface-v: rgba(28, 53, 66, 0.6);
      --primary: #5fd3ff; 
      --on-primary: #003549; 
      --primary-c: #004d69;
      --secondary: #adc9d7; 
      --secondary-c: #2e4854;
      --tertiary: #ffb4a2; 
      --tertiary-c: #7d2b17;
      --error: #ffb4ab; 
      --error-c: #8c1d18; 
      --outline: #8b9296;
      --spring: cubic-bezier(0.43, 1.95, 0.22, 0.75); 
      --ripple-ease: cubic-bezier(0, 0.7, 0.1, 1);
    }

    body.light-theme {
      --bg: #f0f4f8; 
      --surface: rgba(237, 242, 247, 0.85); 
      --surface-v: rgba(222, 228, 233, 0.7);
      --primary: #00668b; 
      --on-primary: #ffffff; 
      --primary-c: #c2e8ff;
      --secondary: #4d616c; 
      --secondary-c: #dbe4e9;
      --tertiary: #b12d10; 
      --tertiary-c: #ffdad2; 
      --error: #ba1a1a; 
      --error-c: #ffdad6;
    }

    /* ==========================================================================
       2. ベース＆背景スタイル
       ========================================================================== */
    body {
      margin: 0; 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--bg); 
      color: var(--secondary);
      padding: 1rem 0.75rem 9rem 0.75rem; 
      display: flex; 
      flex-direction: column; 
      align-items: center;
      overflow-x: hidden; 
      perspective: 1000px; 
      -webkit-tap-highlight-color: transparent;
    }

    /* 背景の流体オーロラアニメーション */
    body::before {
      content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: -1;
      background: radial-gradient(circle, rgba(95,211,255,0.08) 0%, transparent 40%), 
                  radial-gradient(circle, rgba(255,180,162,0.05) 50%, transparent 100%);
      animation: fluidBg 20s linear infinite;
    }
    @keyframes fluidBg { 
      0% { transform: rotate(0deg) translate(0, 0); } 
      50% { transform: rotate(180deg) translate(-30px, 30px); } 
      100% { transform: rotate(360deg) translate(0, 0); } 
    }

    header { text-align: center; margin: 1rem 0; animation: fadeInUp 0.8s var(--spring); width: 100%; max-width: 600px; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    header h1 { font-size: 2rem; font-weight: 800; color: var(--primary); text-shadow: 0 0 20px rgba(95,211,255,0.2); margin: 0.5rem 0; }
    header p { color: var(--outline); font-size: 0.85rem; }
    
    .theme-btn { background-color: var(--surface-v); color: var(--primary); border: none; padding: 0.6rem 1.2rem; border-radius: 24px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem; backdrop-filter: blur(10px); transition: all 0.3s; font-size: 0.85rem; }
    .theme-btn:hover { background-color: var(--primary); color: var(--on-primary); transform: scale(1.05); }

    /* ==========================================================================
       3. メイングリッド ＆ 共通カードコンポーネント
       ========================================================================== */
    .container { max-width: 1240px; width: 100%; display: flex; flex-direction: column; gap: 2rem; }
    .section-card { background-color: var(--surface); border-radius: 28px; padding: 1.25rem; backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.04); box-shadow: 0 8px 24px rgba(0,0,0,0.15); transform-style: preserve-3d; box-sizing: border-box; }
    .section-card h2 { font-size: 1.15rem; margin-top: 0; margin-bottom: 1.25rem; color: var(--primary); display: flex; align-items: center; gap: 0.4rem; }
    .grid-area { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; }

    /* 全パーツ共通のベースデザイン */
    .m3-card {
      padding: 1rem 0.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; font-size: 0.75rem; font-weight: 600; gap: 0.4rem; min-height: 95px; box-sizing: border-box;
      background-color: var(--surface-v); border: 1px solid rgba(255,255,255,0.02); border-radius: 18px;
    }
    .m3-card:hover { border-radius: 24px; }

    /* インタラクション＆3Dパララックス用の土台 */
    .pixel-interactive { position: relative; overflow: hidden; cursor: pointer; border: none; transform-style: preserve-3d; backface-visibility: hidden; transition: transform 0.15s ease-out, border-radius 0.4s var(--spring), background-color 0.3s; }
    .pixel-interactive * { transform: translateZ(15px); }
    .pixel-interactive::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.08), transparent); transform: translateX(-100%); transition: transform 0.6s ease; }
    .pixel-interactive:hover::before { transform: translateX(100%); }

    /* タップ時の光る波紋（リップルエフェクト） */
    .m3-ripple { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.02) 70%, transparent 100%); pointer-events: none; transform: scale(0); animation: ripple-hyper 0.55s var(--ripple-ease) forwards; }
    body.light-theme .m3-ripple { background: radial-gradient(circle, rgba(0,0,0,0.12) 0%, transparent 80%); }
    @keyframes ripple-hyper { to { transform: scale(5); opacity: 0; } }

    /* ==========================================================================
       4. 各セクション固有のデザインクラス
       ========================================================================== */
    /* セクション1: 特徴的なシェイプデザイン */
    .v-sh1 { border-radius: 36px 12px; background: linear-gradient(135deg, var(--primary-c), #003549); color: var(--primary); }
    .v-sh2 { border-radius: 24px 24px 4px 24px; background-color: var(--secondary-c); }
    .v-sh3 { border-radius: 36px 36px 4px 4px; background-color: var(--tertiary-c); color: var(--tertiary); }
    .v-sh4 { border-radius: 50% 20%; border: 1.5px dashed var(--outline); background: transparent; }
    .v-sh5 { border-radius: 24px 50% 24px 50% / 50% 24px 50% 24px; background-color: var(--error-c); color: var(--error); }

    /* セクション2: ボタンデザイン */
    .v-btn-filled { background: linear-gradient(90deg, var(--primary), #00a2ff); color: var(--on-primary); border-radius: 24px; }
    .v-btn-tonal { background: var(--secondary-c); color: var(--secondary); border-radius: 14px; }
    .v-btn-elevated { background: var(--surface-v); box-shadow: 0 6px 16px rgba(0,0,0,0.3); border-radius: 20px; }
    .v-btn-outlined { border: 2px solid var(--primary); background: transparent; color: var(--primary); border-radius: 18px; }
    .v-btn-split-l { border-radius: 24px 4px 4px 24px; background: var(--tertiary); color: #000; }
    .v-btn-split-r { border-radius: 4px 24px 24px 4px; background: var(--tertiary-c); color: var(--tertiary); }

    /* セクション3: ステータスカード */
    .v-card-pro { align-items: flex-start; text-align: left; padding-left: 0.8rem; border-radius: 20px; background: linear-gradient(145deg, var(--surface-v), rgba(10,20,30,0.8)); }
    .v-badge { background: var(--error); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 8px; font-weight: bold; animation: pulseBadge 2s infinite; }
    @keyframes pulseBadge { 0%, 100% { transform: scale(1) translateZ(15px); } 50% { transform: scale(1.08) translateZ(15px); box-shadow: 0 0 8px var(--error); } }
    
    /* セクション4: プログレスインジケータ */
    .v-track { width: 90%; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; position: relative; margin-top: 4px; }
    .v-bar { height: 100%; background: linear-gradient(90deg, var(--primary), #a2e5ff); position: absolute; border-radius: 4px; }
    .v-bar-wave { width: 45%; animation: waveMove 1.2s infinite cubic-bezier(0.4, 0, 0.2, 1); }
    .v-bar-step { width: 30%; animation: waveMove 2.2s infinite steps(5); background: var(--tertiary); }
    @keyframes waveMove { 0% { left: -50%; } 100% { left: 100%; } }
    .v-circle-load { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.05); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s infinite linear; }

    /* セクション5: 最新ExpressiveUI */
    .v-chip { height: 38px; border-radius: 12px; border: 1px solid var(--outline); flex-direction: row; padding: 0 0.6rem; }
    .v-chip:hover { border-radius: 20px; background: var(--primary-c); color: var(--primary); }

    /* スクショ再現：Pixelスイッチ */
    .pixel-switch { width: 50px; height: 30px; border-radius: 15px; background-color: var(--surface-v); border: 2px solid var(--outline); position: relative; transition: all 0.25s var(--spring); cursor: pointer; }
    .pixel-switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background-color: var(--outline); transition: left 0.3s var(--spring), width 0.15s ease, background-color 0.25s; }
    .pixel-switch:active::after { width: 26px; }
    .pixel-switch.active { background-color: #00beff; border-color: transparent; box-shadow: 0 0 12px rgba(0,190,255,0.3); }
    .pixel-switch.active::after { left: 23px; background-color: #002230; }
    .pixel-switch.active:active::after { left: 17px; }

    /* ==========================================================================
       5. ダイアログウィンドウ (最前面表示固定バグ修正済)
       ========================================================================= */
    .m3-dialog-overlay { 
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
      background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(12px); 
      display: flex; align-items: center; justify-content: center; 
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 1rem; box-sizing: border-box; 
      z-index: 99999 !important; transform: translateZ(999px);
    }
    .m3-dialog-overlay.open { opacity: 1; pointer-events: auto; }
    .m3-dialog-window { background-color: #1a2c36; border: 1px solid rgba(255,255,255,0.12); width: 100%; max-width: 400px; padding: 2rem; border-radius: 32px; box-shadow: 0 24px 60px rgba(0,0,0,0.6); color: #edf2f7; text-align: center; transform: scale(0.7) translateY(60px); transition: transform 0.45s var(--spring); box-sizing: border-box; }
    body.light-theme .m3-dialog-window { background-color: #ffffff; color: #1a2c36; box-shadow: 0 24px 60px rgba(0,0,0,0.15); }
    .m3-dialog-overlay.open .m3-dialog-window { transform: scale(1) translateY(0); }
    .m3-dialog-window h3 { margin-top: 0; font-size: 1.4rem; color: var(--primary); display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .m3-dialog-window p { font-size: 0.9rem; color: var(--secondary); line-height: 1.6; margin: 1.5rem 0; text-align: left; }
    .m3-dialog-close-btn { background-color: var(--primary); color: var(--on-primary); border: none; padding: 0.75rem 1.75rem; border-radius: 20px; font-weight: bold; cursor: pointer; transition: transform 0.2s; font-size: 0.9rem; }

    /* ==========================================================================
       6. 固定配置：追従型特大FABシステム (スクショ完全再現)
       ========================================================================== */
    .fab-group { 
      position: fixed !important; bottom: 24px !important; right: 24px !important; 
      display: flex; flex-direction: column; align-items: flex-end; gap: 12px; z-index: 90000 !important; 
    }
    .fab-menu-item { display: flex; align-items: center; gap: 12px; background: linear-gradient(135deg, #00beff, #008cb3); color: #002230; padding: 16px 32px; border-radius: 28px 28px 4px 28px; font-weight: 800; font-size: 1rem; opacity: 0; transform: scale(0) translateY(30px); pointer-events: none; transition: all 0.4s var(--spring); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .fab-trigger { width: 76px; height: 76px; background: linear-gradient(135deg, #83d5ff, #3ec1ff); color: #003549; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 28px rgba(0,0,0,0.4); transition: transform 0.3s var(--spring); }
    .fab-trigger span { font-size: 2.5rem; transition: transform 0.3s var(--spring); }
    
    .fab-group.active .fab-menu-item { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
    .fab-group.active .fab-trigger { background: var(--surface-v); color: var(--primary); transform: scale(0.9); }
    .fab-group.active .fab-trigger span { transform: rotate(135deg); }

    /* モニター用レスポンシブブレイクポイント */
    @media (min-width: 768px) {
      body { padding: 2rem 1.5rem 8rem 1.5rem; } header h1 { font-size: 2.5rem; } header p { font-size: 0.95rem; }
      .section-card { padding: 2rem; } .grid-area { gap: 1.2rem; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); } .catalog-item { font-size: 0.8rem; min-height: 90px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Material 3 Expressive</h1>
    <p>120種 完全独立コンポーネント・マスターショールーム</p>
  </header>

  <div class="theme-switch-container">
    <button class="theme-btn" onclick="toggleTheme()">
      <span class="material-symbols-outlined" id="theme-icon">light_mode</span>
      <span id="theme-text">ライトモードにする</span>
    </button>
  </div>

  <div class="fab-group" id="pixelFabGroup">
    <button class="fab-menu-item pixel-interactive"><span class="material-symbols-outlined">image</span>画像</button>
    <button class="fab-menu-item pixel-interactive"><span class="material-symbols-outlined">gesture</span>図形描画</button>
    <button class="fab-menu-item pixel-interactive"><span class="material-symbols-outlined">mic</span>音声</button>
    <button class="fab-menu-item pixel-interactive"><span class="material-symbols-outlined">ballot</span>リスト</button>
    <button class="fab-menu-item pixel-interactive"><span class="material-symbols-outlined">match_word</span>テキスト</button>
    <button class="fab-trigger pixel-interactive" onclick="toggleFabMenu()">
      <span class="material-symbols-outlined">add</span>
    </button>
  </div>

  <div class="container">
    <div class="section-card"><h2><span class="material-symbols-outlined">auto_awesome_motion</span>1. Dynamic Shapes (01-25)</h2><div class="grid-area" id="sec-1"></div></div>
    <div class="section-card"><h2><span class="material-symbols-outlined">smart_button</span>2. Functional Buttons (26-50)</h2><div class="grid-area" id="sec-2"></div></div>
    <div class="section-card"><h2><span class="material-symbols-outlined">assigned_turned_in</span>3. Contextual Cards (51-75)</h2><div class="grid-area" id="sec-3"></div></div>
    <div class="section-card"><h2><span class="material-symbols-outlined">playback_speed</span>4. State Indicators (76-100)</h2><div class="grid-area" id="sec-4"></div></div>
    <div class="section-card"><h2><span class="material-symbols-outlined">tune</span>5. Advanced Controls (101-120)</h2><div class="grid-area" id="sec-5"></div></div>
  </div>

  <div class="m3-dialog-overlay" id="customDialogOverlay" onclick="closeM3Dialog(event)">
    <div class="m3-dialog-window">
      <h3 id="dialogTitle"><span class="material-symbols-outlined">info</span>コンポーネント</h3>
      <p id="dialogDescription">解説文</p>
      <button class="m3-dialog-close-btn" onclick="document.getElementById('customDialogOverlay').classList.remove('open')">閉じる</button>
    </div>
  </div>

  <script>
    /* --- セクション1: 形状データ群 --- */
    const sec1Data = [
      { i: 'star', t: 'お気に入り' }, { i: 'favorite', t: 'いいね' }, { i: 'shield', t: 'セキュリティ' }, { i: 'cookie', t: 'クッキー設定' }, { i: 'spa', t: 'リラクゼーション' },
      { i: 'hexagon', t: 'クラスター' }, { i: 'category', t: 'オブジェクト' }, { i: 'wb_cloudy', t: '天候データ' }, { i: 'bubble_chart', t: '分析バブル' }, { i: 'waves', t: 'オーディオ波' },
      { i: 'grain', t: 'ノイズテクスチャ' }, { i: 'polyline', t: 'マッピングルート' }, { i: 'interests', t: 'アクティビティ' }, { i: 'blur_on', t: 'フォーカス調整' }, { i: 'flare', t: 'レンズフレア' },
      { i: 'wb_sunny', t: '高輝度モード' }, { i: 'bedtime', t: 'おやすみ時間' }, { i: 'nature_people', t: 'エコ環境' }, { i: 'diamond', t: 'プレミアムプラン' }, { i: 'egg', t: 'イースターエッグ' },
      { i: 'castle', t: 'ゲームセーブ' }, { i: 'fort', t: '防護ウォール' }, { i: 'rss_feed', t: 'フィード購読' }, { i: 'ac_unit', t: 'クーラー制御' }, { i: 'fingerprint', t: '生体認証ロック' }
    ];
    const sec1 = document.getElementById('sec-1');
    sec1Data.forEach((d, index) => {
      const cls = ['v-sh1', 'v-sh2', 'v-sh3', 'v-sh4', 'v-sh5'][index % 5];
      sec1.innerHTML += `<div class="m3-card pixel-interactive ${cls}" onclick="openM3Dialog('${d.t}', 'Material 3 Expressiveが持つ、美しく非対称に変形する独自の【${d.t}】ジオメトリ形状です。')"><span class="material-symbols-outlined">${d.i}</span><span>${String(index+1).padStart(2,'0')}. ${d.t}</span></div>`;
    });

    /* --- セクション2: ボタンデータ群 --- */
    const sec2Data = ['新規ドキュメント', 'クラウド保存', '即座に削除', '一括キャンセル', '外部リンク共有', 'アセットDL', '一括アップロード', '詳細設定同期', '安全なログイン', '安全なログアウト', '次のステップへ', '前のステップへ', 'データベース検索', '高度なフィルタ', 'ブックマーク保存', 'お買い物カゴ', '即時決済', 'オンラインヘルプ', '利用規約同意', 'マークダウン編集', 'ライブプレビュー', '自動バックアップ', 'リアルタイム同期', 'プッシュ通知オン', 'タスク強制終了'];
    const buttonStyles = ['v-btn-filled', 'v-btn-tonal', 'v-btn-elevated', 'v-btn-outlined', 'v-btn-split-l', 'v-btn-split-r'];
    const sec2 = document.getElementById('sec-2');
    for(let i=26; i<=50; i++) {
      let styleCls = buttonStyles[(i-26) % buttonStyles.length];
      let label = sec2Data[i-26];
      sec2.innerHTML += `<button class="m3-card pixel-interactive ${styleCls}" onclick="openM3Dialog('ボタン: ${label}', 'アクションをトリガーするための専用デザインボタンです。タップ位置から精密なリップル波紋が広がります。')"><span>#${i} ${label}</span></button>`;
    }

    /* --- セクション3: カードデータ群 --- */
    const sec3Data = [{ i: 'account_circle', t: 'ユーザー権限変更', b: 'Admin' }, { i: 'mail', t: '新着メール受信', b: '5件' }, { i: 'warning', t: '空き容量限界値', b: '92%' }, { i: 'music_note', t: '再生中のストリーム', b: 'LIVE' }, { i: 'map', t: 'GPSトラッキング', b: 'ON' }, { i: 'shopping_bag', t: 'タイムセール開始', b: '15%OFF' }, { i: 'battery_charging_full', t: '高速給電システム', b: '100%' }, { i: 'speed', t: '帯域スピードテスト', b: 'Fast' }, { i: 'cloud_done', t: 'バックアップ状況', b: 'OK' }, { i: 'flight_takeoff', t: '航空便運行予定', b: '明日' }, { i: 'celebration', t: '実績トロフィー', b: '解禁' }, { i: 'sports_esports', t: '外部ゲームパッド', b: '接続' }, { i: 'tv', t: '外部モニター出力', b: '4K' }, { i: 'volume_up', t: 'システムマスター音量', b: '70' }, { i: 'vpn_key', t: '暗号化パスキー', b: '保護中' }, { i: 'palette', t: 'ダイナミック配色', b: 'M3E' }, { i: 'translate', t: 'ローカライズ言語', b: 'JA' }, { i: 'wifi', t: '無線LANステータス', b: '5G' }, { i: 'event', t: 'カレンダー催事', b: '3件' }, { i: 'schedule', t: 'タスク締め切り', b: '完了' }, { i: 'pie_chart', t: '統計アナリティクス', b: '確認' }, { i: 'photo_camera', t: '内蔵カメラモジュール', b: '許可' }, { i: 'mic', t: 'オーディオ録音入力', b: '正常' }, { i: 'bluetooth', t: '近距離デバイス通信', b: '探索中' }, { i: 'security', t: 'アンチウイルススキャン', b: '安全' }];
    const sec3 = document.getElementById('sec-3');
    sec3Data.forEach((d, index) => {
      sec3.innerHTML += `<div class="m3-card pixel-interactive v-card-pro" onclick="openM3Dialog('${d.t}', 'コンテクストに基づいた各種ステータスを可視化する情報カードです。右上にリアルタイムバッジ【${d.b}】を搭載。')"><span class="material-symbols-outlined" style="color:var(--primary);">${d.i}</span><div style="font-size:0.7rem; margin-top:4px;">#${index+51} ${d.t}</div><span class="v-badge" style="margin-top:4px;">${d.b}</span></div>`;
    });

    /* --- セクション4: 進捗インジケータ生成 --- */
    const sec4 = document.getElementById('sec-4');
    for(let i=76; i<=100; i++) {
      if(i % 4 === 0) sec4.innerHTML += `<div class="m3-card"><span>#${i} 非同期円形ローダー</span><div class="v-circle-load"></div></div>`;
      else if(i % 4 === 1) sec4.innerHTML += `<div class="m3-card"><span>#${i} 有機波形進捗バー</span><div class="v-track"><div class="v-bar v-bar-wave"></div></div></div>`;
      else if(i % 4 === 2) sec4.innerHTML += `<div class="m3-card"><span>#${i} 5段階ステップバー</span><div class="v-track"><div class="v-bar v-bar-step"></div></div></div>`;
      else sec4.innerHTML += `<div class="m3-card pixel-interactive" style="border-radius:30px;" onclick="openM3Dialog('サクセスシグナル', '非同期処理が完全に成功し、確定したことを通知するチェックマークパーツです。')"><span>#${i} トランザクション完了</span><span class="material-symbols-outlined" style="color:var(--primary)">check_circle</span></div>`;
    }

    /* --- セクション5: 高度なコントロール ＆ スイッチ群 --- */
    const sec5 = document.getElementById('sec-5');
    sec5.innerHTML += `<div class="m3-card" style="gap:8px;"><span>#101 トグルスイッチ(ON)</span><div class="pixel-switch active" onclick="this.classList.toggle('active')"></div></div>`;
    sec5.innerHTML += `<div class="m3-card" style="gap:8px;"><span>#102 トグルスイッチ(OFF)</span><div class="pixel-switch" onclick="this.classList.toggle('active')"></div></div>`;
    for(let i=103; i<=106; i++) { sec5.innerHTML += `<div class="m3-card pixel-interactive v-chip" style="background:var(--secondary-c)" onclick="openM3Dialog('スイッチタブ Tab ${i}', '項目を滑らかに切り替えるマテリアルスイッチタブです。')"><span>Tab ${i}</span></div>`; }
    for(let i=107; i<=112; i++) { sec5.innerHTML += `<div class="m3-card pixel-interactive" onclick="openM3Dialog('伸縮スライダー ${i}', '音量や輝度などを調整する、ホバーでバーが伸縮するコントロールです。')"><span>Slider ${i}</span><div class="v-track"><div class="v-bar" style="width:${(i-100)*12}%"></div></div></div>`; }
    const chipIcons = ['filter_list', 'sell', 'done', 'location_on', 'alarm', 'bookmark', 'star', 'cached'];
    for(let i=113; i<=120; i++) { sec5.innerHTML += `<div class="m3-card pixel-interactive v-chip" onclick="openM3Dialog('タグチップ ${i}', 'コンテンツのフィルタリングや分類タグを表現するパーツです。')"><span class="material-symbols-outlined" style="font-size:1rem;">${chipIcons[i-113]}</span><span>Chip ${i}</span></div>`; }

    /* ==========================================================================
       8. UIシステムインタラクション制御スクリプト
       ========================================================================== */
    // ウィンドウ開閉ロジック
    function openM3Dialog(title, description) {
      document.getElementById('dialogTitle').innerHTML = `<span class="material-symbols-outlined">info</span> ${title}`;
      document.getElementById('dialogDescription').textContent = description;
      document.getElementById('customDialogOverlay').classList.add('open');
    }
    function closeM3Dialog(event) { if (event.target.id === 'customDialogOverlay') document.getElementById('customDialogOverlay').classList.remove('open'); }

    // PCのみ3Dパララックス適用（スマホでのスクロールを最優先に保護）
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (!isTouchDevice) {
      document.addEventListener('mousemove', function(e) {
        if(document.getElementById('customDialogOverlay').classList.contains('open')) return;
        document.querySelectorAll('.pixel-interactive').forEach(card => {
          const rect = card.getBoundingClientRect();
          const distX = e.clientX - (rect.left + rect.width / 2), distY = e.clientY - (rect.top + rect.height / 2);
          if (Math.abs(distX) < 160 && Math.abs(distY) < 160) {
            card.style.transform = `perspective(600px) rotateX(${(distY / rect.height) * -14}deg) rotateY(${(distX / rect.width) * 14}deg) scale(1.03)`;
          } else { card.style.transform = ''; }
        });
      });
      document.addEventListener('mouseout', function() { document.querySelectorAll('.pixel-interactive').forEach(card => card.style.transform = ''); });
    }

    // タップ位置計算型・リップル発生器
    document.addEventListener('click', function(e) {
      if (e.target.closest('.pixel-switch')) return;
      const target = e.target.closest('.pixel-interactive');
      if (!target) return;
      const rect = target.getBoundingClientRect();
      const ripple = document.createElement('span'); ripple.classList.add('m3-ripple');
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = `${size}px`;
      ripple.style.left = `${e.clientX - rect.left - size / 2}px`; ripple.style.top = `${e.clientY - rect.top - size / 2}px`;
      target.appendChild(ripple); ripple.addEventListener('animationend', () => ripple.remove());
    });

    // 各種スイッチ・テーマ制御
    function toggleFabMenu() { document.getElementById('pixelFabGroup').classList.toggle('active'); }
    function toggleTheme() {
      const body = document.body; body.classList.toggle('light-theme');
      const isLight = body.classList.contains('light-theme');
      document.getElementById('theme-icon').textContent = isLight ? 'dark_mode' : 'light_mode';
      document.getElementById('theme-text').textContent = isLight ? 'ダークモードにする' : 'ライトモードにする';
    }
  </script>
</body>
