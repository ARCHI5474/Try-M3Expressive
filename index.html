<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Material 3 Expressive Ultimate</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#060d11;
  --surface:rgba(17,34,43,.76);
  --surface-v:rgba(28,53,66,.6);

  --primary:#5fd3ff;
  --primary-c:#004d69;
  --on-primary:#003549;

  --secondary:#adc9d7;
  --secondary-c:#2e4854;

  --tertiary:#ffb4a2;

  --outline:#8b9296;

  --spring:cubic-bezier(.43,1.95,.22,.75);

  --z-fab:900;
  --z-dialog:1000;
}

body.light-theme{
  --bg:#edf3f7;
  --surface:rgba(255,255,255,.82);
  --surface-v:rgba(239,244,248,.85);

  --primary:#00668b;
  --primary-c:#c2e8ff;
  --on-primary:#fff;

  --secondary:#4a5e68;
  --secondary-c:#dbe4e9;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);
  color:var(--secondary);

  overflow-x:hidden;

  padding:1rem .8rem 9rem;

  transition:
    background .35s ease,
    color .35s ease;
}

/* Aurora */

body::before{
  content:'';
  position:fixed;
  inset:-50%;
  z-index:-1;

  background:
    radial-gradient(circle,rgba(95,211,255,.08),transparent 40%),
    radial-gradient(circle,rgba(255,180,162,.05),transparent 55%);

  animation:aurora 22s linear infinite;
}

@keyframes aurora{
  from{
    transform:rotate(0deg);
  }
  to{
    transform:rotate(360deg);
  }
}

/* Header */

header{
  text-align:center;
  margin:1rem 0 2rem;
}

header h1{
  margin:0;
  font-size:2.5rem;
  font-weight:800;

  color:var(--primary);

  text-shadow:
    0 0 24px rgba(95,211,255,.25);
}

header p{
  color:var(--outline);
  margin-top:.5rem;
}

/* Theme Button */

.theme-btn{
  margin:auto auto 2rem;

  display:flex;
  align-items:center;
  gap:.6rem;

  padding:.8rem 1.3rem;

  border:none;
  border-radius:22px;

  background:var(--surface-v);

  color:var(--primary);

  backdrop-filter:blur(12px);

  cursor:pointer;

  transition:.25s;
}

.theme-btn:hover{
  transform:scale(1.05);
}

/* Layout */

.container{
  max-width:1300px;
  margin:auto;

  display:flex;
  flex-direction:column;
  gap:2rem;

  transition:filter .3s ease;
}

body.fab-open .container{
  filter:
    blur(3px)
    brightness(.8);
}

.section-card{
  background:var(--surface);

  border-radius:32px;

  padding:1.5rem;

  border:1px solid rgba(255,255,255,.05);

  box-shadow:
    0 8px 24px rgba(0,0,0,.18);

  backdrop-filter:blur(14px);
}

.section-card h2{
  margin-top:0;

  display:flex;
  align-items:center;
  gap:.5rem;

  color:var(--primary);
}

.grid-area{
  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(160px,1fr));

  gap:1rem;
}

/* Cards */

.m3-card{
  min-height:100px;

  position:relative;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  gap:.5rem;

  text-align:center;

  padding:1rem;

  border-radius:22px;

  background:var(--surface-v);

  overflow:hidden;

  border:1px solid rgba(255,255,255,.03);

  transition:
    transform .2s ease-out,
    border-radius .35s var(--spring),
    background .3s ease;
}

.pixel-interactive{
  cursor:pointer;

  transform-style:preserve-3d;
  perspective:600px;

  will-change:transform;
}

.pixel-interactive:hover{
  border-radius:28px;
}

.pixel-interactive *{
  transform:translateZ(18px);
}

.pixel-interactive::before{
  content:'';

  position:absolute;
  inset:0;

  background:
    linear-gradient(
      45deg,
      transparent,
      rgba(255,255,255,.08),
      transparent
    );

  transform:translateX(-100%);
  transition:transform .6s ease;
}

.pixel-interactive:hover::before{
  transform:translateX(100%);
}

/* Ripple */

.m3-ripple{
  position:absolute;

  border-radius:50%;

  transform:scale(0);

  pointer-events:none;

  background:
    radial-gradient(circle,
    rgba(255,255,255,.35),
    transparent 70%);

  animation:ripple .6s cubic-bezier(0,.7,.1,1);
}

@keyframes ripple{
  to{
    transform:scale(5);
    opacity:0;
  }
}

/* Shapes */

.v-sh1{
  border-radius:38px 12px;
  background:
    linear-gradient(
      135deg,
      var(--primary-c),
      #003549
    );

  color:var(--primary);
}

.v-sh2{
  border-radius:26px 26px 4px 26px;
}

.v-sh3{
  border-radius:40px 40px 4px 4px;
  background:#35231d;
}

.v-sh4{
  border-radius:50% 20%;
  border:2px dashed var(--outline);
}

.v-sh5{
  border-radius:
    24px 50% 24px 50% /
    50% 24px 50% 24px;
}

/* Buttons */

.v-btn-filled{
  background:
    linear-gradient(
      135deg,
      var(--primary),
      #00a2ff
    );

  color:var(--on-primary);
}

.v-btn-tonal{
  background:var(--secondary-c);
}

.v-btn-outline{
  border:2px solid var(--primary);
  background:transparent;
  color:var(--primary);
}

/* Progress */

.v-track{
  width:90%;
  height:8px;

  border-radius:999px;

  overflow:hidden;

  background:
    rgba(255,255,255,.08);
}

.v-bar{
  height:100%;
  width:45%;

  border-radius:999px;

  background:
    linear-gradient(
      90deg,
      var(--primary),
      #9fe6ff
    );

  animation:progress 1.3s infinite;
}

@keyframes progress{
  from{
    transform:translateX(-120%);
  }
  to{
    transform:translateX(300%);
  }
}

/* Toggle */

.pixel-switch{
  width:54px;
  height:30px;

  border-radius:999px;

  background:var(--surface-v);

  border:2px solid var(--outline);

  position:relative;

  cursor:pointer;

  transition:.25s var(--spring);
}

.pixel-switch::after{
  content:'';

  position:absolute;

  top:3px;
  left:3px;

  width:20px;
  height:20px;

  border-radius:50%;

  background:var(--outline);

  transition:.3s var(--spring);
}

.pixel-switch.active{
  background:#00beff;
  border-color:transparent;
}

.pixel-switch.active::after{
  left:27px;
  background:#002230;
}

/* Chips */

.v-chip{
  flex-direction:row;

  min-height:auto;

  height:42px;

  border-radius:14px;

  padding:0 .9rem;
}

/* FAB */

.fab-group{
  position:fixed;

  right:24px;
  bottom:calc(24px + env(safe-area-inset-bottom));

  z-index:var(--z-fab);

  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:12px;

  transition:
    transform .25s ease;
}

.fab-menu-item{
  border:none;

  display:flex;
  align-items:center;
  gap:.7rem;

  padding:15px 26px;

  border-radius:28px 28px 6px 28px;

  background:
    linear-gradient(
      135deg,
      #00beff,
      #0095c2
    );

  color:#002230;

  font-weight:800;

  opacity:0;

  transform:
    scale(.4)
    translateY(20px);

  pointer-events:none;

  transition:
    all .35s var(--spring);

  box-shadow:
    0 8px 24px rgba(0,0,0,.3);
}

.fab-trigger{
  width:64px;
  height:64px;

  border:none;
  border-radius:50%;

  background:
    linear-gradient(
      135deg,
      #83d5ff,
      #3ec1ff
    );

  color:#003549;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;

  box-shadow:
    0 10px 28px rgba(0,0,0,.35);

  transition:
    transform .3s var(--spring),
    background .3s;
}

.fab-trigger .material-symbols-rounded{
  font-size:2rem;
  transition:transform .35s var(--spring);
}

.fab-group.active .fab-menu-item{
  opacity:1;

  transform:
    scale(1)
    translateY(0);

  pointer-events:auto;
}

.fab-group.active .fab-trigger{
  transform:scale(.9);

  background:var(--surface-v);

  color:var(--primary);
}

.fab-group.active .fab-trigger .material-symbols-rounded{
  transform:rotate(135deg);
}

/* Dialog */

.m3-dialog-overlay{
  position:fixed;
  inset:0;

  z-index:var(--z-dialog);

  background:rgba(0,0,0,.72);

  backdrop-filter:blur(12px);

  display:flex;
  align-items:center;
  justify-content:center;

  opacity:0;
  pointer-events:none;

  transition:.3s ease;
}

.m3-dialog-overlay.open{
  opacity:1;
  pointer-events:auto;
}

.m3-dialog-window{
  width:min(400px,90vw);

  background:#182830;

  border-radius:32px;

  padding:2rem;

  transform:
    scale(.7)
    translateY(60px);

  transition:
    transform .4s var(--spring);
}

body.light-theme .m3-dialog-window{
  background:white;
  color:#162129;
}

.m3-dialog-overlay.open .m3-dialog-window{
  transform:
    scale(1)
    translateY(0);
}

.dialog-close{
  border:none;

  margin-top:1rem;

  background:var(--primary);

  color:var(--on-primary);

  padding:.8rem 1.4rem;

  border-radius:18px;

  cursor:pointer;
}

@media (prefers-reduced-motion: reduce){

  *,
  *::before,
  *::after{
    animation:none !important;
    transition:none !important;
  }

}

</style>
</head>

<body>

<header>
  <h1>Material 3 Expressive</h1>
  <p>Ultimate Showcase Edition</p>
</header>

<button class="theme-btn" onclick="toggleTheme()">
  <span class="material-symbols-rounded" id="theme-icon">light_mode</span>
  <span id="theme-text">ライトモード</span>
</button>

<!-- FAB -->

<div class="fab-group" id="pixelFabGroup">

  <button class="fab-menu-item pixel-interactive">
    <span class="material-symbols-rounded">image</span>
    画像
  </button>

  <button class="fab-menu-item pixel-interactive">
    <span class="material-symbols-rounded">mic</span>
    音声
  </button>

  <button class="fab-menu-item pixel-interactive">
    <span class="material-symbols-rounded">draw</span>
    描画
  </button>

  <button class="fab-menu-item pixel-interactive">
    <span class="material-symbols-rounded">edit_note</span>
    テキスト
  </button>

  <button class="fab-trigger pixel-interactive" onclick="toggleFabMenu()">
    <span class="material-symbols-rounded">add</span>
  </button>

</div>

<div class="container">

  <!-- Shapes -->

  <div class="section-card">

    <h2>
      <span class="material-symbols-rounded">auto_awesome</span>
      Dynamic Shapes
    </h2>

    <div class="grid-area" id="shapes"></div>

  </div>

  <!-- Buttons -->

  <div class="section-card">

    <h2>
      <span class="material-symbols-rounded">smart_button</span>
      Buttons
    </h2>

    <div class="grid-area" id="buttons"></div>

  </div>

  <!-- Progress -->

  <div class="section-card">

    <h2>
      <span class="material-symbols-rounded">progress_activity</span>
      State Indicators
    </h2>

    <div class="grid-area" id="progress"></div>

  </div>

  <!-- Toggles -->

  <div class="section-card">

    <h2>
      <span class="material-symbols-rounded">toggle_on</span>
      Toggles & Chips
    </h2>

    <div class="grid-area" id="toggles"></div>

  </div>

</div>

<!-- Dialog -->

<div class="m3-dialog-overlay" id="dialog" onclick="closeDialog(event)">

  <div class="m3-dialog-window">

    <h2 id="dialogTitle"></h2>

    <p id="dialogText"></p>

    <button class="dialog-close"
      onclick="document.getElementById('dialog').classList.remove('open')">
      閉じる
    </button>

  </div>

</div>

<script>

/* Shape Cards */

const shapes = [
  'お気に入り',
  'クラウド',
  '通知',
  '分析',
  '同期',
  'AI',
  'ゲーム',
  '検索'
];

const shapeClasses = [
  'v-sh1',
  'v-sh2',
  'v-sh3',
  'v-sh4',
  'v-sh5'
];

const shapeRoot =
  document.getElementById('shapes');

shapes.forEach((name,index)=>{

  shapeRoot.innerHTML += `
    <div class="m3-card pixel-interactive ${shapeClasses[index % 5]}"
      onclick="openDialog('${name}','${name} UI コンポーネント')">

      <span class="material-symbols-rounded">
        auto_awesome
      </span>

      <span>${name}</span>

    </div>
  `;

});

/* Buttons */

const buttonRoot =
  document.getElementById('buttons');

const btnStyles = [
  'v-btn-filled',
  'v-btn-tonal',
  'v-btn-outline'
];

[
  '保存',
  '共有',
  '同期',
  '検索',
  '購入',
  '削除'
].forEach((name,index)=>{

  buttonRoot.innerHTML += `
    <button class="m3-card pixel-interactive ${btnStyles[index % 3]}"
      onclick="openDialog('${name}','${name}ボタン')">

      <span>${name}</span>

    </button>
  `;

});

/* Progress */

const progressRoot =
  document.getElementById('progress');

for(let i=0;i<6;i++){

  progressRoot.innerHTML += `
    <div class="m3-card">

      <span>処理中...</span>

      <div class="v-track">
        <div class="v-bar"></div>
      </div>

    </div>
  `;

}

/* Toggles */

const toggleRoot =
  document.getElementById('toggles');

toggleRoot.innerHTML += `
  <div class="m3-card">

    <span>Wi-Fi</span>

    <div class="pixel-switch active"
      onclick="this.classList.toggle('active')">
    </div>

  </div>
`;

toggleRoot.innerHTML += `
  <div class="m3-card">

    <span>Bluetooth</span>

    <div class="pixel-switch"
      onclick="this.classList.toggle('active')">
    </div>

  </div>
`;

[
  'Music',
  'Gaming',
  'Focus',
  'Travel'
].forEach(name=>{

  toggleRoot.innerHTML += `
    <div class="m3-card pixel-interactive v-chip"
      onclick="openDialog('${name}','Chip Component')">

      <span class="material-symbols-rounded">
        sell
      </span>

      <span>${name}</span>

    </div>
  `;

});

/* Dialog */

function openDialog(title,text){

  document.getElementById('dialogTitle')
    .textContent = title;

  document.getElementById('dialogText')
    .textContent = text;

  document.getElementById('dialog')
    .classList.add('open');

}

function closeDialog(e){

  if(e.target.id === 'dialog'){
    e.target.classList.remove('open');
  }

}

/* Theme */

function toggleTheme(){

  document.body.classList.toggle('light-theme');

  const light =
    document.body.classList.contains('light-theme');

  document.getElementById('theme-icon')
    .textContent =
      light ? 'dark_mode' : 'light_mode';

  document.getElementById('theme-text')
    .textContent =
      light ? 'ダークモード' : 'ライトモード';

}

/* FAB */

function toggleFabMenu(){

  document
    .getElementById('pixelFabGroup')
    .classList.toggle('active');

  document.body.classList.toggle('fab-open');

}

/* Optimized Parallax */

const isTouch =
  'ontouchstart' in window ||
  navigator.maxTouchPoints > 0;

if(!isTouch){

  let activeCard = null;

  document.addEventListener('mouseover',e=>{

    const card =
      e.target.closest('.pixel-interactive');

    if(card){
      activeCard = card;
    }

  });

  document.addEventListener('mouseout',e=>{

    const card =
      e.target.closest('.pixel-interactive');

    if(card){

      card.style.transform = '';

      if(activeCard === card){
        activeCard = null;
      }

    }

  });

  document.addEventListener('mousemove',e=>{

    if(!activeCard) return;

    const rect =
      activeCard.getBoundingClientRect();

    const x =
      e.clientX - (rect.left + rect.width / 2);

    const y =
      e.clientY - (rect.top + rect.height / 2);

    activeCard.style.transform = `
      perspective(600px)
      rotateX(${(y / rect.height) * -12}deg)
      rotateY(${(x / rect.width) * 12}deg)
      scale(1.03)
    `;

  });

}

/* Ripple */

document.addEventListener('click',e=>{

  if(e.target.closest('.pixel-switch')) return;

  const target =
    e.target.closest('.pixel-interactive');

  if(!target) return;

  const rect =
    target.getBoundingClientRect();

  const ripple =
    document.createElement('span');

  ripple.className = 'm3-ripple';

  const size =
    Math.max(rect.width,rect.height);

  ripple.style.width =
    ripple.style.height =
      `${size}px`;

  ripple.style.left =
    `${e.clientX - rect.left - size/2}px`;

  ripple.style.top =
    `${e.clientY - rect.top - size/2}px`;

  target.appendChild(ripple);

  ripple.addEventListener('animationend',()=>{
    ripple.remove();
  });

});

/* FAB Scroll */

let lastScrollY = window.scrollY;

window.addEventListener('scroll',()=>{

  const fab =
    document.getElementById('pixelFabGroup');

  if(window.scrollY > lastScrollY){

    fab.style.transform = 'scale(.92)';

  }else{

    fab.style.transform = 'scale(1)';

  }

  lastScrollY = window.scrollY;

});

</script>

</body>
</html>
