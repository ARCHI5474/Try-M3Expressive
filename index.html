<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Material 3 Expressive - Improved</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#060d11;
  --surface:rgba(17,34,43,.72);
  --surface-v:rgba(28,53,66,.55);

  --primary:#5fd3ff;
  --on-primary:#003549;
  --primary-c:#004d69;

  --secondary:#adc9d7;
  --secondary-c:#2e4854;

  --outline:#8b9296;

  --spring:cubic-bezier(.43,1.95,.22,.75);

  --z-base:1;
  --z-card:10;
  --z-fab:900;
  --z-dialog:1000;
}

body.light-theme{
  --bg:#edf3f7;
  --surface:rgba(255,255,255,.75);
  --surface-v:rgba(240,245,248,.75);

  --primary:#00668b;
  --on-primary:#fff;
  --primary-c:#c2e8ff;

  --secondary:#425964;
  --secondary-c:#dbe4e9;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);
  color:var(--secondary);

  overflow-x:hidden;

  padding:1rem .8rem 8rem;

  transition:
    background .35s ease,
    color .35s ease;
}

/* Aurora Background */
body::before{
  content:'';
  position:fixed;
  inset:-50%;
  z-index:-1;

  background:
    radial-gradient(circle,rgba(95,211,255,.08),transparent 40%),
    radial-gradient(circle,rgba(255,180,162,.05),transparent 55%);

  animation:aurora 20s linear infinite;
}

@keyframes aurora{
  0%{
    transform:rotate(0deg);
  }
  100%{
    transform:rotate(360deg);
  }
}

/* Header */

header{
  text-align:center;
  margin:1rem 0 2rem;
}

header h1{
  margin:0;
  color:var(--primary);
  font-size:2.2rem;
  font-weight:800;

  text-shadow:0 0 24px rgba(95,211,255,.22);
}

header p{
  color:var(--outline);
  margin-top:.5rem;
}

/* Theme Button */

.theme-btn{
  border:none;

  display:flex;
  align-items:center;
  gap:.6rem;

  margin:auto auto 2rem;

  background:var(--surface-v);

  color:var(--primary);

  padding:.8rem 1.3rem;

  border-radius:20px;

  cursor:pointer;

  backdrop-filter:blur(12px);

  transition:.25s;
}

.theme-btn:hover{
  transform:scale(1.05);
}

/* Layout */

.container{
  max-width:1300px;
  margin:auto;

  display:flex;
  flex-direction:column;
  gap:2rem;

  transition:filter .3s ease;
}

body.fab-open .container{
  filter:
    blur(3px)
    brightness(.8);
}

.section-card{
  background:var(--surface);

  border-radius:30px;

  padding:1.5rem;

  border:1px solid rgba(255,255,255,.05);

  box-shadow:
    0 8px 24px rgba(0,0,0,.18);

  backdrop-filter:blur(14px);
}

.section-card h2{
  margin-top:0;

  display:flex;
  align-items:center;
  gap:.5rem;

  color:var(--primary);
}

.grid-area{
  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(170px,1fr));

  gap:1rem;
}

/* Cards */

.m3-card{
  min-height:100px;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  gap:.5rem;

  text-align:center;

  padding:1rem;

  background:var(--surface-v);

  border-radius:22px;

  transition:
    transform .2s ease-out,
    border-radius .35s var(--spring),
    background .3s ease;

  border:1px solid rgba(255,255,255,.03);

  position:relative;

  overflow:hidden;
}

.pixel-interactive{
  cursor:pointer;

  transform-style:preserve-3d;

  perspective:600px;

  will-change:transform;
}

.pixel-interactive:hover{
  border-radius:28px;
}

.pixel-interactive *{
  transform:translateZ(18px);
}

/* Shine */

.pixel-interactive::before{
  content:'';

  position:absolute;
  inset:0;

  background:
    linear-gradient(
      45deg,
      transparent,
      rgba(255,255,255,.08),
      transparent
    );

  transform:translateX(-100%);
  transition:transform .6s ease;
}

.pixel-interactive:hover::before{
  transform:translateX(100%);
}

/* Ripple */

.m3-ripple{
  position:absolute;

  border-radius:50%;

  transform:scale(0);

  pointer-events:none;

  background:
    radial-gradient(circle,
    rgba(255,255,255,.35),
    transparent 70%);

  animation:ripple .6s cubic-bezier(0,.7,.1,1);
}

@keyframes ripple{
  to{
    transform:scale(5);
    opacity:0;
  }
}

/* Shapes */

.v-sh1{
  border-radius:38px 12px;
  background:linear-gradient(135deg,var(--primary-c),#003549);
  color:var(--primary);
}

.v-sh2{
  border-radius:26px 26px 4px 26px;
}

.v-sh3{
  border-radius:40px 40px 4px 4px;
  background:#38231d;
}

.v-sh4{
  border-radius:50% 20%;
  border:2px dashed var(--outline);
}

.v-sh5{
  border-radius:
    24px 50% 24px 50% /
    50% 24px 50% 24px;
}

/* FAB */

.fab-group{
  position:fixed;

  right:24px;
  bottom:calc(24px + env(safe-area-inset-bottom));

  z-index:var(--z-fab);

  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:12px;

  transition:
    transform .25s ease,
    opacity .25s ease;
}

.fab-menu-item{
  border:none;

  display:flex;
  align-items:center;
  gap:.7rem;

  padding:15px 26px;

  border-radius:28px 28px 6px 28px;

  background:
    linear-gradient(
      135deg,
      #00beff,
      #0095c2
    );

  color:#002230;

  font-weight:800;

  opacity:0;

  transform:
    scale(.4)
    translateY(20px);

  pointer-events:none;

  transition:
    all .35s var(--spring);

  box-shadow:
    0 8px 24px rgba(0,0,0,.3);
}

.fab-trigger{
  width:64px;
  height:64px;

  border:none;

  border-radius:50%;

  background:
    linear-gradient(
      135deg,
      #83d5ff,
      #3ec1ff
    );

  color:#003549;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;

  box-shadow:
    0 10px 28px rgba(0,0,0,.35);

  transition:
    transform .3s var(--spring),
    background .3s;
}

.fab-trigger .material-symbols-rounded{
  font-size:2rem;

  transition:transform .35s var(--spring);
}

.fab-group.active .fab-menu-item{
  opacity:1;

  transform:
    scale(1)
    translateY(0);

  pointer-events:auto;
}

.fab-group.active .fab-trigger{
  transform:scale(.9);
  background:var(--surface-v);
  color:var(--primary);
}

.fab-group.active .fab-trigger .material-symbols-rounded{
  transform:rotate(135deg);
}

/* Dialog */

.m3-dialog-overlay{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,.72);

  backdrop-filter:blur(12px);

  display:flex;
  align-items:center;
  justify-content:center;

  opacity:0;
  pointer-events:none;

  transition:.3s ease;

  z-index:var(--z-dialog);
}

.m3-dialog-overlay.open{
  opacity:1;
  pointer-events:auto;
}

.m3-dialog-window{
  width:min(400px,90vw);

  background:#182830;

  border-radius:32px;

  padding:2rem;

  color:white;

  transform:
    scale(.7)
    translateY(60px);

  transition:
    transform .4s var(--spring);
}

body.light-theme .m3-dialog-window{
  background:white;
  color:#162129;
}

.m3-dialog-overlay.open .m3-dialog-window{
  transform:
    scale(1)
    translateY(0);
}

.dialog-close{
  border:none;

  margin-top:1rem;

  background:var(--primary);

  color:var(--on-primary);

  padding:.8rem 1.5rem;

  border-radius:18px;

  cursor:pointer;
}

/* Reduce Motion */

@media (prefers-reduced-motion: reduce){

  *,
  *::before,
  *::after{
    animation:none !important;
    transition:none !important;
  }

}

/* Responsive */

@media (min-width:768px){

  body{
    padding:2rem 1.5rem 8rem;
  }

  header h1{
    font-size:3rem;
  }

}
</style>
</head>

<body>

<header>
  <h1>Material 3 Expressive</h1>
  <p>Improved Pixel-style Showcase UI</p>
</header>

<button class="theme-btn" onclick="toggleTheme()">
  <span class="material-symbols-rounded" id="theme-icon">light_mode</span>
  <span id="theme-text">ライトモード</span>
</button>

<!-- FAB -->

<div class="fab-group" id="pixelFabGroup">

  <button class="fab-menu-item pixel-interactive">
    <span class="material-symbols-rounded">image</span>
    画像
  </button>

  <button class="fab-menu-item pixel-interactive">
    <span class="material-symbols-rounded">mic</span>
    音声
  </button>

  <button class="fab-menu-item pixel-interactive">
    <span class="material-symbols-rounded">draw</span>
    描画
  </button>

  <button class="fab-trigger pixel-interactive" onclick="toggleFabMenu()">
    <span class="material-symbols-rounded">add</span>
  </button>

</div>

<!-- Content -->

<div class="container">

  <div class="section-card">

    <h2>
      <span class="material-symbols-rounded">auto_awesome</span>
      Dynamic Shapes
    </h2>

    <div class="grid-area" id="grid"></div>

  </div>

</div>

<!-- Dialog -->

<div class="m3-dialog-overlay" id="dialog" onclick="closeDialog(event)">

  <div class="m3-dialog-window">

    <h2 id="dialogTitle"></h2>

    <p id="dialogText"></p>

    <button class="dialog-close"
      onclick="document.getElementById('dialog').classList.remove('open')">
      閉じる
    </button>

  </div>

</div>

<script>

/* Generate Cards */

const grid = document.getElementById('grid');

const items = [
  'お気に入り',
  'クラウド',
  'オーディオ',
  'セキュリティ',
  'フォーカス',
  '通知',
  '分析',
  'ゲーム',
  '同期',
  '検索',
  '保存',
  'AI',
];

const shapes = [
  'v-sh1',
  'v-sh2',
  'v-sh3',
  'v-sh4',
  'v-sh5'
];

items.forEach((name,index)=>{

  const card = document.createElement('div');

  card.className =
    `m3-card pixel-interactive ${shapes[index % 5]}`;

  card.innerHTML = `
    <span class="material-symbols-rounded">
      auto_awesome
    </span>

    <span>${name}</span>
  `;

  card.onclick = ()=>{
    openDialog(
      name,
      `${name}コンポーネントの詳細UIです。`
    );
  };

  grid.appendChild(card);

});

/* Dialog */

function openDialog(title,text){

  document.getElementById('dialogTitle').textContent = title;
  document.getElementById('dialogText').textContent = text;

  document
    .getElementById('dialog')
    .classList.add('open');
}

function closeDialog(e){

  if(e.target.id === 'dialog'){
    e.target.classList.remove('open');
  }

}

/* FAB */

function toggleFabMenu(){

  document
    .getElementById('pixelFabGroup')
    .classList.toggle('active');

  document.body.classList.toggle('fab-open');

}

/* Theme */

function toggleTheme(){

  document.body.classList.toggle('light-theme');

  const light =
    document.body.classList.contains('light-theme');

  document.getElementById('theme-icon')
    .textContent =
      light ? 'dark_mode' : 'light_mode';

  document.getElementById('theme-text')
    .textContent =
      light ? 'ダークモード' : 'ライトモード';

}

/* Optimized Parallax */

const isTouch =
  'ontouchstart' in window ||
  navigator.maxTouchPoints > 0;

if(!isTouch){

  let activeCard = null;

  document
    .querySelectorAll('.pixel-interactive')
    .forEach(card=>{

      card.addEventListener('mouseenter',()=>{
        activeCard = card;
      });

      card.addEventListener('mouseleave',()=>{

        card.style.transform = '';
        activeCard = null;

      });

    });

  document.addEventListener('mousemove',e=>{

    if(!activeCard) return;

    const rect =
      activeCard.getBoundingClientRect();

    const x =
      e.clientX - (rect.left + rect.width / 2);

    const y =
      e.clientY - (rect.top + rect.height / 2);

    activeCard.style.transform = `
      perspective(600px)
      rotateX(${(y / rect.height) * -12}deg)
      rotateY(${(x / rect.width) * 12}deg)
      scale(1.03)
    `;

  });

}

/* Ripple */

document.addEventListener('click',e=>{

  const target =
    e.target.closest('.pixel-interactive');

  if(!target) return;

  const rect =
    target.getBoundingClientRect();

  const ripple =
    document.createElement('span');

  ripple.className = 'm3-ripple';

  const size =
    Math.max(rect.width,rect.height);

  ripple.style.width =
    ripple.style.height =
      `${size}px`;

  ripple.style.left =
    `${e.clientX - rect.left - size/2}px`;

  ripple.style.top =
    `${e.clientY - rect.top - size/2}px`;

  target.appendChild(ripple);

  ripple.addEventListener('animationend',()=>{
    ripple.remove();
  });

});

/* FAB Scroll Behavior */

let lastScrollY = window.scrollY;

window.addEventListener('scroll',()=>{

  const fab =
    document.getElementById('pixelFabGroup');

  if(window.scrollY > lastScrollY){

    fab.style.transform = 'scale(.92)';

  }else{

    fab.style.transform = 'scale(1)';

  }

  lastScrollY = window.scrollY;

});

</script>

</body>
</html>
